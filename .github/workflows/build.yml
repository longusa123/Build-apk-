name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Cấp quyền thực thi cho gradlew
      run: |
        if [ -f "OffsetTester-1.0/gradlew" ]; then
          chmod +x OffsetTester-1.0/gradlew
        fi

    - name: Tiến hành Biên dịch APK (Debug)
      run: |
        cd OffsetTester-1.0
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        else
          echo "Không tìm thấy file gradlew trong thư mục OffsetTester-1.0. Vui lòng kiểm tra lại cấu trúc dự án!"
          exit 1
        fi

    - name: Tải file APK lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OffsetTester-Debug-APK
        path: OffsetTester-1.0/**/build/outputs/apk/**/*.apk
