name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép bạn bấm nút tự Build thủ công trên giao diện Web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Tự động lưu cache để lần sau build nhanh gấp 2-3 lần

      - name: Cấp quyền thực thi cho gradlew
        run: chmod +x gradlew

      - name: Tiến hành Build APK Debug
        run: ./gradlew assembleDebug

      - name: Tải file APK lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
